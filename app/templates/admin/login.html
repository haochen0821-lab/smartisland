{% extends "base.html" %}
{% block title %}管理員登入{% endblock %}
{% block content %}
<div class="card" style="max-width:380px;margin:40px auto">
  <h2>管理員登入</h2>
  <form method="post" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>帳號<input type="text" name="username" required></label>
    <label>密碼<input type="password" name="password" required></label>
    <div class="actions">
      <button class="btn" type="submit">登入</button>
    </div>
  </form>
  <p class="muted small" style="margin-top:14px">預設 <code>admin / smartisland2026</code>（請於 .env 修改）</p>
</div>
{% endblock %}
