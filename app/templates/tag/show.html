<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{{ product.name }} ｜ 電子標籤</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script>
    (function(){
      try{
        var t = localStorage.getItem('sih_theme');
        if (t === 'dark') document.documentElement.classList.add('dark');
      }catch(e){}
    })();
    setTimeout(()=>location.reload(), 60000);  // 每分鐘刷新
  </script>
  <style>
    .tag-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);transition:background .3s,color .3s}
    .tag-card{max-width:560px;width:100%;background:var(--surface);border-radius:24px;padding:36px;text-align:center;box-shadow:var(--shadow)}
    .tag-icon{font-size:7rem;line-height:1;margin-bottom:8px}
    .tag-name{font-size:2rem;font-weight:800;color:var(--ink);margin:8px 0}
    .tag-meta{color:var(--muted);font-size:1.05rem;margin-bottom:18px}
    .tag-light{display:inline-flex;align-items:center;gap:14px;padding:18px 26px;border-radius:999px;border:3px solid var(--line);margin-bottom:18px;background:var(--surface-2)}
    .tag-light .dot{width:32px;height:32px;border-radius:50%}
    .tag-light .dot.green{background:var(--green);box-shadow:0 0 0 8px rgba(58,165,92,.18)}
    .tag-light .dot.yellow{background:var(--yellow);box-shadow:0 0 0 8px rgba(233,161,59,.18)}
    .tag-light .dot.red{background:var(--red);box-shadow:0 0 0 8px rgba(214,90,90,.18)}
    .tag-light .lab{font-size:1.6rem;font-weight:700;color:var(--ink)}
    .tag-stock{font-size:1.4rem;color:var(--ink);margin-top:6px}
    .tag-warn{color:var(--red);margin-top:8px;font-weight:600}
    .tag-back{position:fixed;top:14px;left:14px}
  </style>
</head>
<body class="tag-page">
  <a class="btn ghost tag-back" href="{{ url_for('main.home') }}">⬅ 回首頁</a>
  <div class="tag-card">
    {% if product.photo %}
      <img src="{{ url_for('static', filename='uploads/products/' + product.photo) }}" alt="" style="max-height:200px;border-radius:14px;margin-bottom:12px">
    {% else %}
      <div class="tag-icon">{{ product.icon }}</div>
    {% endif %}
    <div class="tag-name">{{ product.name }}</div>
    <div class="tag-meta">${{ product.price }} / {{ product.unit }}　SKU {{ product.sku }}</div>
    <div class="tag-light">
      <span class="dot {{ color }}"></span>
      <span class="lab">{{ label }}</span>
    </div>
    <div class="tag-stock">目前庫存：<strong>{{ product.stock }}</strong> {{ product.unit }}　/　安全水位 {{ product.safety_stock }}</div>
    {% if weather_alert %}<div class="tag-warn">⚠️ 今日天候警示，補給可能延遲</div>{% endif %}
  </div>
</body>
</html>
