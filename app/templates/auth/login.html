{% extends "base.html" %}
{% block title %}登入 ｜ {{ site_name }}{% endblock %}
{% block content %}
<div class="card" style="max-width:420px;margin:0 auto">
  <h2>登入</h2>
  <form method="post" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>帳號<input type="text" name="username" required></label>
    <label>密碼<input type="password" name="password" required></label>
    <div class="actions">
      <button class="btn" type="submit">登入</button>
      <a class="btn ghost" href="{{ url_for('auth.register') }}">沒有帳號？註冊</a>
    </div>
  </form>
  <p class="muted small" style="margin-top:14px">
    Demo 帳號：<code>chen / demo1234</code>（民宿主人，已備好「民宿早餐 6 人組」）
  </p>
</div>
{% endblock %}
